<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 400 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="190" fill="#F5F7FA" stroke="#13294B" stroke-width="4"/>
  
  <!-- UIUC Pattern -->
  <circle cx="200" cy="200" r="170" fill="#F5F7FA" stroke="#E84A27" stroke-width="2" stroke-dasharray="4 4"/>
  
  <!-- Head -->
  <circle cx="200" cy="140" r="70" fill="#E3E8EF"/>
  <circle cx="200" cy="140" r="65" fill="#F5F7FA"/>
  
  <!-- Coder with Laptop Shape -->
  <rect x="130" y="210" width="140" height="100" rx="10" fill="#13294B"/>
  
  <!-- Laptop Screen -->
  <rect x="140" y="220" width="120" height="75" rx="5" fill="#F5F7FA"/>
  
  <!-- Code Lines -->
  <rect x="150" y="230" width="60" height="4" rx="2" fill="#E84A27"/>
  <rect x="150" y="240" width="90" height="4" rx="2" fill="#13294B" opacity="0.7"/>
  <rect x="150" y="250" width="40" height="4" rx="2" fill="#13294B" opacity="0.7"/>
  <rect x="150" y="260" width="70" height="4" rx="2" fill="#E84A27"/>
  <rect x="150" y="270" width="50" height="4" rx="2" fill="#13294B" opacity="0.7"/>
  <rect x="150" y="280" width="80" height="4" rx="2" fill="#13294B" opacity="0.7"/>
  
  <!-- Laptop Base -->
  <rect x="145" y="295" width="110" height="5" rx="2" fill="#13294B" opacity="0.9"/>
  
  <!-- Eyes -->
  <circle cx="175" cy="130" r="10" fill="#13294B"/>
  <circle cx="225" cy="130" r="10" fill="#13294B"/>
  
  <!-- Glasses -->
  <circle cx="175" cy="130" r="15" fill="none" stroke="#13294B" stroke-width="2"/>
  <circle cx="225" cy="130" r="15" fill="none" stroke="#13294B" stroke-width="2"/>
  <line x1="190" y1="130" x2="210" y2="130" stroke="#13294B" stroke-width="2"/>
  
  <!-- Smile -->
  <path d="M175 160 Q200 180 225 160" stroke="#13294B" stroke-width="3" fill="none"/>
  
  <!-- Hair -->
  <path d="M135 120 Q140 70 200 70 Q260 70 265 120" fill="#13294B"/>
  
  <!-- Arms -->
  <path d="M130 260 Q100 280 110 320" stroke="#13294B" stroke-width="5" fill="none"/>
  <path d="M270 260 Q300 280 290 320" stroke="#13294B" stroke-width="5" fill="none"/>
  
  <!-- UIUC Branding small text -->
  <text x="200" y="350" font-family="Arial, sans-serif" font-size="12" fill="#13294B" text-anchor="middle" font-weight="bold">UIUC STUDENT</text>
</svg>