<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="300" fill="#13294B" rx="15" />
  
  <!-- Blockchain Chain -->
  <g fill="#E84A27" stroke="white" stroke-width="2">
    <!-- Block 1 -->
    <rect x="100" y="100" width="60" height="60" rx="5" />
    <!-- Block 2 -->
    <rect x="220" y="100" width="60" height="60" rx="5" />
    <!-- Block 3 -->
    <rect x="340" y="100" width="60" height="60" rx="5" />
  </g>
  
  <!-- Connecting Lines -->
  <line x1="160" y1="130" x2="220" y2="130" stroke="white" stroke-width="3" />
  <line x1="280" y1="130" x2="340" y2="130" stroke="white" stroke-width="3" />
  
  <!-- Data Symbols in Blocks -->
  <g fill="white" font-family="monospace" font-weight="bold">
    <text x="115" y="125" font-size="12">#1A2B</text>
    <text x="110" y="145" font-size="10">HASH</text>
    
    <text x="235" y="125" font-size="12">#3C4D</text>
    <text x="230" y="145" font-size="10">HASH</text>
    
    <text x="355" y="125" font-size="12">#5E6F</text>
    <text x="350" y="145" font-size="10">HASH</text>
  </g>
  
  <!-- Supply Chain Elements -->
  <!-- Factory -->
  <g transform="translate(100, 200)">
    <rect x="-20" y="-15" width="40" height="30" fill="#3A75C4" />
    <rect x="-15" y="-25" width="10" height="10" fill="#3A75C4" />
    <rect x="5" y="-25" width="10" height="10" fill="#3A75C4" />
  </g>
  
  <!-- Truck -->
  <g transform="translate(200, 200)">
    <rect x="-25" y="-10" width="50" height="20" fill="#E84A27" />
    <rect x="-35" y="-5" width="10" height="15" fill="#E84A27" />
    <circle cx="-20" cy="10" r="5" fill="#333" />
    <circle cx="20" cy="10" r="5" fill="#333" />
  </g>
  
  <!-- Warehouse -->
  <g transform="translate(300, 200)">
    <rect x="-25" y="-20" width="50" height="30" fill="#3A75C4" />
    <path d="M-25 -20 L0 -40 L25 -20" fill="#3A75C4" stroke="white" stroke-width="1" />
    <rect x="-5" y="-5" width="10" height="15" fill="white" />
  </g>
  
  <!-- Store -->
  <g transform="translate(400, 200)">
    <rect x="-25" y="-25" width="50" height="35" fill="#E84A27" />
    <rect x="-15" y="-5" width="30" height="15" fill="white" />
    <rect x="-20" y="-35" width="40" height="10" fill="#3A75C4" />
  </g>
  
  <!-- Supply Chain Connection -->
  <path d="M100 210 L200 210 L300 210 L400 210" stroke="white" stroke-width="2" stroke-dasharray="5,5" />
  
  <!-- Text -->
  <text x="250" y="265" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
    Blockchain Supply Chain
  </text>
  <text x="250" y="285" font-family="Arial, sans-serif" font-size="14" fill="#E84A27" text-anchor="middle">
    Transparent • Secure • Efficient
  </text>
</svg>