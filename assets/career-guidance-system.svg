<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="300" viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="300" fill="#13294B" rx="15" />
  
  <!-- Career Path Visual -->
  <path d="M50 150 C100 50, 150 250, 200 150 C250 50, 300 250, 350 150 C400 50, 450 250, 500 150" 
        stroke="#E84A27" stroke-width="8" fill="none" stroke-linecap="round" />
  
  <!-- Professional Icons -->
  <!-- Graduation Cap -->
  <g transform="translate(100, 150) scale(0.8)">
    <rect x="-25" y="-5" width="50" height="10" fill="#E84A27" />
    <rect x="-20" y="-25" width="40" height="20" fill="#E84A27" />
    <rect x="-25" y="-30" width="50" height="5" fill="#E84A27" />
    <line x1="0" y1="-30" x2="15" y2="-40" stroke="#E84A27" stroke-width="3" />
    <circle cx="20" cy="-40" r="5" fill="#E84A27" />
  </g>
  
  <!-- Briefcase -->
  <g transform="translate(250, 150) scale(0.8)">
    <rect x="-25" y="-20" width="50" height="35" fill="#FFF" />
    <rect x="-25" y="-20" width="50" height="10" fill="#E84A27" />
    <rect x="-10" y="-30" width="20" height="10" fill="#E84A27" />
  </g>
  
  <!-- Globe -->
  <g transform="translate(400, 150) scale(0.8)">
    <circle cx="0" cy="0" r="25" fill="#3A75C4" />
    <ellipse cx="0" cy="0" rx="25" ry="10" fill="none" stroke="#E84A27" stroke-width="2" />
    <line x1="-25" y1="0" x2="25" y2="0" stroke="#E84A27" stroke-width="2" />
    <line x1="0" y1="-25" x2="0" y2="25" stroke="#E84A27" stroke-width="2" />
  </g>
  
  <!-- Text -->
  <text x="250" y="250" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="white" text-anchor="middle">
    Career Guidance System
  </text>
  <text x="250" y="275" font-family="Arial, sans-serif" font-size="14" fill="#E84A27" text-anchor="middle">
    AI-Powered Career Pathways
  </text>
</svg>