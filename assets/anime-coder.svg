<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="500" height="500" fill="#13294B" rx="15" />
  
  <!-- Laptop Base -->
  <rect x="100" y="300" width="300" height="20" fill="#333" rx="5" />
  <rect x="125" y="200" width="250" height="150" fill="#222" rx="5" />
  <rect x="135" y="210" width="230" height="130" fill="#111" rx="3" />
  
  <!-- Code on Screen -->
  <g fill="#4f8" font-family="monospace" font-size="8">
    <text x="145" y="230">function developerSkills() {</text>
    <text x="155" y="245">const skills = [</text>
    <text x="165" y="260">'Python', 'Java', 'SQL',</text>
    <text x="165" y="275">'AWS', 'Big Data', 'ML',</text>
    <text x="165" y="290">'Cybersecurity', 'APIs'</text>
    <text x="155" y="305">];</text>
    <text x="155" y="320">return skills.join(' + ');</text>
    <text x="145" y="335">}</text>
  </g>
  
  <!-- Anime Character -->
  <!-- Head -->
  <circle cx="310" cy="150" r="50" fill="#FFD8C4" />
  
  <!-- Hair -->
  <path d="M310 100 Q340 70 360 110 Q380 140 365 170 Q340 190 320 190 L310 190 L310 100" fill="#E84A27" />
  <path d="M310 100 Q280 70 260 110 Q240 140 255 170 Q280 190 300 190 L310 190 L310 100" fill="#E84A27" />
  <path d="M300 95 Q310 80 320 95 L320 110 L300 110 Z" fill="#E84A27" />
  
  <!-- Eyes -->
  <ellipse cx="290" cy="145" rx="10" ry="12" fill="white" />
  <ellipse cx="330" cy="145" rx="10" ry="12" fill="white" />
  <circle cx="290" cy="145" r="5" fill="#13294B" />
  <circle cx="330" cy="145" r="5" fill="#13294B" />
  <circle cx="292" cy="142" r="2" fill="white" />
  <circle cx="332" cy="142" r="2" fill="white" />
  
  <!-- Eyebrows -->
  <path d="M280 133 Q290 128 300 133" stroke="#E84A27" stroke-width="2" fill="none" />
  <path d="M320 133 Q330 128 340 133" stroke="#E84A27" stroke-width="2" fill="none" />
  
  <!-- Mouth -->
  <path d="M300 170 Q310 180 320 170" stroke="#B55" stroke-width="2" fill="none" />
  
  <!-- Glasses -->
  <rect x="275" y="135" width="30" height="20" stroke="#444" stroke-width="2" fill="none" rx="5" />
  <rect x="315" y="135" width="30" height="20" stroke="#444" stroke-width="2" fill="none" rx="5" />
  <line x1="305" y1="145" x2="315" y2="145" stroke="#444" stroke-width="2" />
  
  <!-- Body -->
  <path d="M280 200 L260 300 L340 300 L320 200 Z" fill="#13294B" />
  
  <!-- Collar -->
  <path d="M280 200 L290 220 L310 210 L330 220 L320 200 Z" fill="#E84A27" />
  
  <!-- Arms -->
  <path d="M280 200 Q250 230 240 270 L250 280 Q265 250 290 220 Z" fill="#FFD8C4" />
  <path d="M320 200 Q340 240 350 250 L360 240 Q350 220 330 200 Z" fill="#FFD8C4" />
  
  <!-- UIUC Text -->
  <text x="250" y="450" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="#E84A27" text-anchor="middle">UIUC Illini</text>
</svg>